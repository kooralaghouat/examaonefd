<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Media | نظام الإدارة والفرز الذكي V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4361ee; --bg: #f4f7fe; --danger: #ef233c; --warning: #ff9f1c; --white: #ffffff; --success: #2ec4b6; --gray: #8d99ae; --purple: #7209b7; --pink: #d43f8d; --cyan: #00b4d8; }
        * { box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; direction: rtl; overflow-x: hidden; }

        /* شاشة التحميل */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--white); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* التصميم */
        .sidebar { width: 280px; height: 100vh; background: var(--white); position: fixed; right: 0; top: 0; padding: 20px; box-shadow: -2px 0 15px rgba(0,0,0,0.05); z-index: 1000; overflow-y: auto; }
        .main { margin-right: 280px; padding: 15px; min-height: 100vh; padding-bottom: 120px; }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); text-align: center; margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }

        .nav-btn { display: block; width: 100%; padding: 10px; border: none; background: none; text-align: right; font-family: 'Cairo'; font-weight: 600; cursor: pointer; color: var(--gray); border-radius: 10px; margin-bottom: 3px; transition: 0.3s; font-size: 12px; }
        .nav-btn:hover { background: #f8f9fa; color: var(--primary); }
        .nav-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(67, 97, 238, 0.2); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; margin-bottom: 15px; }
        .stat-card { background: var(--white); padding: 10px; border-radius: 12px; text-align: center; border-bottom: 3px solid var(--primary); }
        .stat-card span { display: block; font-size: 18px; font-weight: 800; color: var(--primary); }
        .stat-card h3 { margin: 3px 0 0; font-size: 10px; color: var(--gray); }

        .card { background: var(--white); border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.03); margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 10px; text-align: right; color: #444; font-size: 11px; border-bottom: 1px solid #eee; }
        td { padding: 10px; border-bottom: 1px solid #f1f3f5; font-size: 12px; vertical-align: middle; }
        
        /* شريط الحذف المتعدد السفلي */
        .action-bar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: white; padding: 12px 25px; border-radius: 50px; display: none; align-items: center; gap: 15px; z-index: 2000; box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        .btn { padding: 6px 12px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Cairo'; font-weight: bold; font-size: 11px; transition: 0.2s; }
        .btn-del { background: #fff1f2; color: var(--danger); }
        .btn-edit { background: #eef2ff; color: var(--primary); margin-left: 5px; }
        
        .time-label { display: block; font-size: 10px; color: #999; margin-top: 5px; font-weight: 600; }
        .dup-header { background: #fff5f5; color: var(--danger); font-weight: bold; border-right: 5px solid var(--danger); }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div><h2 style="color:var(--primary)">جاري فرز البيانات...</h2></div>

    <div class="sidebar">
        <div class="logo">SUPER MEDIA</div>
        <button class="nav-btn active" onclick="window.switchTab('all', this)">📚 بنك الأسئلة (الكل)</button>
        <button class="nav-btn" onclick="window.switchTab('exact', this)">✅ متطابق تماماً</button>
        <button class="nav-btn" onclick="window.switchTab('smart', this)">✨ مكرر ذكي (إجابة مختلفة)</button>
        <button class="nav-btn" onclick="window.switchTab('fuzzy', this)">🎨 مكرر تشكيل ورموز</button>
        <button class="nav-btn" onclick="window.switchTab('cfg', this)">🔗 إدارة الروابط</button>
        <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
        <button class="nav-btn" style="background:var(--success); color:white" onclick="window.addNewQ()">+ إضافة سؤال يدوي</button>
        <button class="nav-btn" style="background:var(--primary); color:white; margin-top:5px" onclick="window.addNewLink()">+ إضافة رابط جديد</button>
        <button class="nav-btn" style="background:#333; color:white; margin-top:10px" onclick="window.exportBackup()">💾 حفظ نسخة احتياطية (JSON)</button>
    </div>

    <div class="main">
        <div class="stats-grid">
            <div class="stat-card"><h3>إجمالي الأسئلة</h3><span id="statTotal">0</span></div>
            <div class="stat-card" style="border-color:var(--success)"><h3>متطابق</h3><span id="statExact">0</span></div>
            <div class="stat-card" style="border-color:var(--pink)"><h3>تعارض إجابة</h3><span id="statSmart">0</span></div>
            <div class="stat-card" style="border-color:var(--cyan)"><h3>تشكيل</h3><span id="statFuzzy">0</span></div>
        </div>

        <div id="globalActionBar" class="action-bar">
            <span>تم تحديد <b id="selectedCount">0</b> عناصر</span>
            <button class="btn" style="background:var(--danger); color:white; font-size:13px" onclick="window.deleteSelected()">🗑️ حذف العناصر المختارة الآن</button>
            <button class="btn" style="background:#444; color:white" onclick="window.deselectAll()">إلغاء</button>
        </div>

        <!-- الأقسام -->
        <div id="all-tab" class="tab-section">
            <input type="text" id="searchInput" class="nav-btn" style="background:white; border:1px solid #ddd; width:100%; text-align:right" placeholder="بحث سريع في الأسئلة أو الإجابات..." onkeyup="window.renderCurrentTab()">
            <div class="card">
                <table>
                    <thead><tr><th><input type="checkbox" onclick="window.toggleAll(this)"></th><th>المعرف ID</th><th>السؤال والتاريخ</th><th>الإجابة</th><th>الإجراء</th></tr></thead>
                    <tbody id="allBody"></tbody>
                </table>
            </div>
            <button class="nav-btn" style="width:100%; background:#eee; margin-top:10px" onclick="window.loadMore()">تحميل المزيد ↓</button>
        </div>

        <div id="exact-tab" class="tab-section" style="display:none;"><div class="card"><table><thead><tr><th><input type="checkbox" onclick="window.toggleAll(this)"></th><th>المعرف</th><th>المحتوى المتطابق</th><th>الإجراء</th></tr></thead><tbody id="exactBody"></tbody></table></div></div>
        <div id="smart-tab" class="tab-section" style="display:none;"><div class="card"><table><thead><tr><th><input type="checkbox" onclick="window.toggleAll(this)"></th><th>النوع</th><th>السؤال</th><th>إجابات متعارضة</th><th>الإجراء</th></tr></thead><tbody id="smartBody"></tbody></table></div></div>
        <div id="fuzzy-tab" class="tab-section" style="display:none;"><div class="card"><table><thead><tr><th><input type="checkbox" onclick="window.toggleAll(this)"></th><th>النوع</th><th>السؤال</th><th>الإجابة</th><th>الإجراء</th></tr></thead><tbody id="fuzzyBody"></tbody></table></div></div>
        <div id="cfg-tab" class="tab-section" style="display:none;"><div class="card"><table><thead><tr><th>المفتاح</th><th>الرابط</th><th>الإجراء</th></tr></thead><tbody id="cfgBody"></tbody></table></div></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, remove, update } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDD3q7W8k3Qb2X0FroDH5ntgp9qpSjgpnY",
        authDomain: "casnos-ecf2f.firebaseapp.com",
        databaseURL: "https://exameonefd-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "casnos-ecf2f",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let processedData = []; 
    let configData = {};
    let activeTab = 'all';
    let displayLimit = 50;

    // تنظيف النصوص
    const normalize = (t) => {
        if (!t) return "";
        return t.toString().replace(/<[^>]*>/g, "").replace(/[\u064B-\u065F]/g, "").replace(/[أإآ]/g, "ا").replace(/ة/g, "ه").replace(/\s+/g, " ").trim();
    };

    // تنسيق التاريخ
    const formatDate = (ts) => {
        if (!ts) return "بيانات قديمة (قبل الحذف)";
        return new Date(ts).toLocaleString('ar-DZ', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', hour12: true});
    };

    onValue(ref(db, '/'), (snapshot) => {
        const data = snapshot.val() || {};
        const rawQs = data.questions || {};
        configData = data.config ? (data.config.data || {}) : {};
        
        processedData = Object.keys(rawQs).map(id => ({
            id, 
            rawQ: rawQs[id].q, 
            rawA: rawQs[id].a,
            timestamp: rawQs[id].t || null,
            nQ: normalize(rawQs[id].q), 
            nA: normalize(rawQs[id].a)
        }));

        window.renderCurrentTab();
        updateStats();
        document.getElementById('loader').style.display = 'none';
    });

    function updateStats() {
        let exact = 0, smart = 0, fuzzy = 0;
        const groups = {};
        processedData.forEach(i => { if(!groups[i.nQ]) groups[i.nQ] = []; groups[i.nQ].push(i); });
        Object.values(groups).forEach(arr => {
            if(new Set(arr.map(i => i.rawQ + i.rawA)).size < arr.length) exact++;
            if(new Set(arr.map(i => i.nA)).size > 1) smart++;
            if(new Set(arr.map(i => i.nA)).size === 1 && new Set(arr.map(i => i.rawQ + i.rawA)).size > 1) fuzzy++;
        });
        document.getElementById('statTotal').innerText = processedData.length;
        document.getElementById('statExact').innerText = exact;
        document.getElementById('statSmart').innerText = smart;
        document.getElementById('statFuzzy').innerText = fuzzy;
    }

    window.renderCurrentTab = () => {
        const bodyMap = { all: renderAll, exact: renderExact, smart: renderSmart, fuzzy: renderFuzzy, cfg: renderConfigs };
        bodyMap[activeTab]();
        window.updateSelectedUI();
    };

    function renderAll() {
        const body = document.getElementById('allBody');
        const s = document.getElementById('searchInput').value.toLowerCase();
        const filtered = processedData.filter(i => i.rawQ.toLowerCase().includes(s) || i.rawA.toLowerCase().includes(s));
        
        body.innerHTML = filtered.slice(0, displayLimit).map(i => `
            <tr>
                <td><input type="checkbox" class="item-cb" value="${i.id}" onchange="window.updateSelectedUI()"></td>
                <td><small style="color:#888">${i.id}</small></td>
                <td>
                    <b>${i.rawQ}</b>
                    <span class="time-label">📅 أرسل في: ${formatDate(i.timestamp)}</span>
                </td>
                <td style="color:var(--primary); font-weight:bold">${i.rawA}</td>
                <td>
                    <button class="btn btn-edit" onclick="window.editQuestion('${i.id}', '${i.rawQ}', '${i.rawA}')">تعديل</button>
                    <button class="btn btn-del" onclick="window.deleteItem('questions/${i.id}')">حذف</button>
                </td>
            </tr>
        `).join('');
    }

    function renderExact() {
        const body = document.getElementById('exactBody');
        let html = ""; const groups = {};
        processedData.forEach(i => { let k = i.nQ + "|||" + i.nA; if(!groups[k]) groups[k] = []; groups[k].push(i); });
        Object.values(groups).filter(a => a.length > 1).forEach(arr => {
            html += `<tr class="dup-header"><td colspan="4">متطابق تماماً (${arr.length} نسخ)</td></tr>`;
            arr.forEach(i => {
                html += `<tr><td><input type="checkbox" class="item-cb" value="${i.id}"></td><td>${i.id}</td><td>${i.rawQ}<span class="time-label">${formatDate(i.timestamp)}</span></td><td><button class="btn btn-del" onclick="window.deleteItem('questions/${i.id}')">حذف</button></td></tr>`;
            });
        });
        body.innerHTML = html;
    }

    function renderSmart() {
        const body = document.getElementById('smartBody');
        let html = ""; const groups = {};
        processedData.forEach(i => { if(!groups[i.nQ]) groups[i.nQ] = []; groups[i.nQ].push(i); });
        Object.values(groups).filter(a => new Set(a.map(i => i.nA)).size > 1).forEach(arr => {
            html += `<tr class="dup-header" style="background:#fff0f6; color:var(--pink)"><td colspan="5">⚠️ نفس السؤال - إجابات متعارضة</td></tr>`;
            arr.forEach(i => {
                html += `<tr><td><input type="checkbox" class="item-cb" value="${i.id}"></td><td>ذكي</td><td>${i.rawQ}<span class="time-label">${formatDate(i.timestamp)}</span></td><td style="color:red; font-weight:bold">${i.rawA}</td><td><button class="btn btn-del" onclick="window.deleteItem('questions/${i.id}')">حذف</button></td></tr>`;
            });
        });
        body.innerHTML = html;
    }

    function renderFuzzy() {
        const body = document.getElementById('fuzzyBody');
        let html = ""; const groups = {};
        processedData.forEach(i => { let k = i.nQ + "|||" + i.nA; if(!groups[k]) groups[k] = []; groups[k].push(i); });
        Object.values(groups).filter(a => a.length > 1 && new Set(a.map(i => i.rawQ + i.rawA)).size > 1).forEach(arr => {
            html += `<tr class="dup-header" style="background:#e0f7fa; color:var(--cyan)"><td colspan="5">🎨 مكرر تشكيل أو رموز</td></tr>`;
            arr.forEach(i => {
                html += `<tr><td><input type="checkbox" class="item-cb" value="${i.id}"></td><td>تشكيل</td><td>${i.rawQ}<span class="time-label">${formatDate(i.timestamp)}</span></td><td>${i.rawA}</td><td><button class="btn btn-del" onclick="window.deleteItem('questions/${i.id}')">حذف</button></td></tr>`;
            });
        });
        body.innerHTML = html;
    }

    function renderConfigs() {
        const body = document.getElementById('cfgBody');
        body.innerHTML = Object.keys(configData).map(id => `
            <tr><td><b>${configData[id].k}</b></td><td><a href="${configData[id].l}" target="_blank">${configData[id].l}</a></td>
            <td><button class="btn btn-edit" onclick="window.editLink('${id}', '${configData[id].k}', '${configData[id].l}')">تعديل</button>
            <button class="btn btn-del" onclick="window.deleteItem('config/data/${id}')">حذف</button></td></tr>
        `).join('');
    }

    window.switchTab = (t, b) => {
        activeTab = t;
        document.querySelectorAll('.tab-section').forEach(s => s.style.display = 'none');
        document.getElementById(t + '-tab').style.display = 'block';
        if(b) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
        }
        window.renderCurrentTab();
    };

    window.addNewQ = () => {
        const id = prompt("ID:"), q = prompt("السؤال:"), a = prompt("الإجابة:");
        if(id && q && a) set(ref(db, `questions/${id}`), {q, a, t: Date.now()});
    };

    window.editQuestion = (id, oldQ, oldA) => {
        const q = prompt("تعديل السؤال:", oldQ), a = prompt("تعديل الإجابة:", oldA);
        if(q && a) update(ref(db, `questions/${id}`), {q, a});
    };

    window.addNewLink = () => {
        const k = prompt("المفتاح:"), l = prompt("الرابط:");
        if(k && l) set(ref(db, `config/data/link_${Date.now()}`), {k, l});
    };

    window.editLink = (id, oldK, oldL) => {
        const k = prompt("المفتاح الجديد:", oldK), l = prompt("الرابط الجديد:", oldL);
        if(k && l) update(ref(db, `config/data/${id}`), {k, l});
    };

    window.deleteItem = (p) => { if(confirm("حذف؟")) remove(ref(db, p)); };
    window.toggleAll = (m) => { document.querySelectorAll('.item-cb').forEach(c => c.checked = m.checked); window.updateSelectedUI(); };
    window.updateSelectedUI = () => {
        const s = document.querySelectorAll('.item-cb:checked').length;
        document.getElementById('globalActionBar').style.display = s > 0 ? 'flex' : 'none';
        document.getElementById('selectedCount').innerText = s;
    };
    window.deleteSelected = () => {
        const ids = Array.from(document.querySelectorAll('.item-cb:checked')).map(c => c.value);
        if(confirm(`حذف ${ids.length} عناصر؟`)) {
            const updates = {}; ids.forEach(id => updates[`questions/${id}`] = null);
            update(ref(db), updates).then(() => window.deselectAll());
        }
    };
    window.deselectAll = () => { document.querySelectorAll('.item-cb').forEach(c => c.checked = false); window.updateSelectedUI(); };
    window.loadMore = () => { displayLimit += 100; window.renderCurrentTab(); };

    // النسخة الاحتياطية
    window.exportBackup = () => {
        const backup = { questions: {}, config: { data: configData } };
        processedData.forEach(i => { backup.questions[i.id] = { q: i.rawQ, a: i.rawA, t: i.timestamp }; });
        const blob = new Blob([JSON.stringify(backup)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `backup_${Date.now()}.json`;
        a.click();
    };
</script>
</body>
</html>
