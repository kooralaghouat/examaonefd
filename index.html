<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Media V11 | نظام التنظيم والفرز الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #2563eb; --bg: #f8fafc; --c: #ffffff; --d: #e11d48; --s: #059669; --w: #d97706; --txt: #0f172a; --mut: #64748b; --border: #e2e8f0; }
        * { box-sizing: border-box; transition: 0.2s; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; color: var(--txt); display: flex; }
        
        .sidebar { width: 280px; height: 100vh; background: var(--c); position: fixed; right: 0; padding: 25px; overflow-y: auto; border-left: 1px solid var(--border); z-index: 1000; }
        .logo { font-size: 24px; font-weight: 900; color: var(--p); text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--bg); padding-bottom: 15px; }
        .nav-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-radius: 12px; cursor: pointer; color: var(--txt); margin-bottom: 5px; font-size: 14px; background: transparent; border: none; width: 100%; text-align: right; font-weight: 600; }
        .nav-item:hover, .nav-item.active { background: #eff6ff; color: var(--p); }
        .sub-group { margin-right: 20px; border-right: 2px solid var(--border); padding-right: 15px; margin-bottom: 15px; }
        .sub-item { padding: 8px; font-size: 13px; color: var(--mut); cursor: pointer; border-radius: 8px; }
        .sub-item:hover, .sub-item.active { color: var(--p); background: #f1f5f9; }

        .main { margin-right: 280px; width: calc(100% - 280px); padding: 30px; min-height: 100vh; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--c); padding: 20px; border-radius: 15px; border-bottom: 4px solid var(--p); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .stat-card h3 { font-size: 12px; color: var(--mut); margin: 0; }
        .stat-card p { margin: 5px 0 0; font-size: 26px; font-weight: 900; color: var(--txt); }

        .filter-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .f-btn { padding: 10px 18px; border-radius: 12px; border: 1px solid var(--border); background: var(--c); color: var(--txt); cursor: pointer; font-size: 13px; font-weight: bold; }
        .f-btn.active { background: var(--p); color: white; border-color: var(--p); }

        .content-card { background: var(--c); border-radius: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid var(--border); }
        .toolbar { padding: 15px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; background: #f8fafc; }
        .search { flex: 1; padding: 11px; border: 1px solid var(--border); border-radius: 10px; font-family: inherit; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 15px; text-align: right; font-size: 12px; color: var(--mut); border-bottom: 2px solid var(--border); }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--txt); vertical-align: middle; line-height: 1.5; }
        
        .group-header { background: #fff1f2 !important; font-weight: 800; color: var(--d); }
        .time-label { display: block; font-size: 10px; color: #94a3b8; margin-top: 4px; font-weight: bold; }

        .btn { padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; font-weight: 700; font-size: 12px; }
        .btn-del { background: #fee2e2; color: var(--d); }
        .btn-move { background: #dbeafe; color: var(--p); }

        .action-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 15px 40px; border-radius: 50px; display: none; align-items: center; gap: 20px; z-index: 2000; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    </style>
</head>
<body>

    <div id="loader" style="position:fixed; inset:0; background:white; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <div style="width:45px; height:45px; border:4px solid #f1f5f9; border-top-color:#2563eb; border-radius:50%; animation:spin 1s linear infinite;"></div>
        <p style="color:#2563eb; margin-top:15px; font-weight:bold;">جاري تحليل البيانات...</p>
    </div>

    <div class="sidebar">
        <div class="logo">SUPER MEDIA</div>
        <button class="nav-item active" id="btnAll" onclick="window.loadAll()">📚 كل الأسئلة</button>
        <span style="font-size:11px; color:var(--mut); margin:20px 0 10px; display:block; font-weight:800;">التصنيفات الدراسية</span>
        <div id="treeContainer"></div>
        <hr style="border:0; border-top:1px solid var(--border); margin:20px 0;">
        <button class="nav-item" onclick="window.switchTab('cfg')">🔗 الروابط والأكواد</button>
        <button class="nav-item" onclick="window.exportBackup()">💾 نسخة احتياطية</button>
        <button class="btn" style="background:var(--s); color:white; width:100%; margin-top:15px" onclick="window.addManual()">+ إضافة سؤال يدوي</button>
    </div>

    <div class="main">
        <div class="stat-grid">
            <div class="stat-card"><h3>إجمالي الأسئلة</h3><p id="statTotal">0</p></div>
            <div class="stat-card" style="border-color:var(--d)"><h3>تعارض إجابات</h3><p id="statConflict">0</p></div>
            <div class="stat-card" style="border-color:var(--w)"><h3>مكررات تماماً</h3><p id="statDups">0</p></div>
        </div>

        <div class="filter-bar">
            <button class="f-btn active" onclick="window.setFilter('all', this)">كل الأسئلة</button>
            <button class="f-btn" onclick="window.setFilter('dups', this)" style="color:var(--p)">🔍 مكرر (س وج)</button>
            <button class="f-btn" onclick="window.setFilter('conflict', this)" style="color:var(--d)">⚠️ تعارض (نفس السؤال)</button>
            <button class="f-btn" onclick="window.setFilter('fuzzy', this)">🎨 مكرر تشكيل</button>
        </div>

        <div class="content-card">
            <div class="toolbar">
                <input type="text" id="qSearch" class="search" placeholder="بحث سريع..." onkeyup="window.searchTable()">
                <div id="moveArea" style="display:none; gap:10px; align-items:center;">
                    <span style="font-size:12px; font-weight:800">نقل المحدد إلى:</span>
                    <select id="targetY" style="padding:9px; border-radius:10px; border:1px solid var(--border); background:white;"></select>
                    <select id="targetS" style="padding:9px; border-radius:10px; border:1px solid var(--border); background:white;"></select>
                    <button class="btn btn-move" style="background:var(--p); color:white" onclick="window.processMove()">نقل الآن</button>
                </div>
            </div>
            <table>
                <thead id="tHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
            <button id="loadMoreBtn" class="btn-more" style="width:100%; padding:15px; background:#f8fafc; border:none; cursor:pointer; color:var(--p); font-weight:bold" onclick="window.loadMore()">عرض المزيد ↓</button>
        </div>
    </div>

    <div id="globalActionBar" class="action-bar">
        <span>تم تحديد <b id="selCount">0</b></span>
        <button class="btn" style="background:var(--p); color:white" onclick="window.showMove()">📦 نقل لمجلد آخر</button>
        <button class="btn btn-del" style="background:#450a0a; color:white" onclick="window.bulkDelete()">🗑️ حذف نهائي</button>
        <button class="btn" style="background:#334155; color:white" onclick="window.deselectAll()">إلغاء</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, onValue, remove, update, set } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const config = { databaseURL: "https://exameonefd-default-rtdb.europe-west1.firebasedatabase.app/" };
    const app = initializeApp(config);
    const db = getDatabase(app);

    let dbRaw = {}; let allItems = []; let displayLimit = 150; 
    let filterType = 'all'; let curYear = null, curSub = null; let curTab = 'data';

    const normalize = (t) => t ? t.toString().toLowerCase().replace(/[إأآ]/g, 'ا').replace(/ة/g, 'ه').replace(/ى/g, 'ي').replace(/[\u064B-\u065F]/g, "").replace(/[^\u0621-\u064A0-9a-z]/g, '').trim() : "";
    
    // تنسيق التاريخ ليظهر بشكل بشري
    const formatTime = (ts) => {
        if(!ts) return "---";
        const date = new Date(ts);
        if(isNaN(date.getTime())) return ts; // إذا كان التاريخ نصياً أصلاً
        return date.toLocaleString('ar-DZ', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
    };

    onValue(ref(db, '/'), (snap) => {
        dbRaw = snap.val() || {};
        processData(); renderTree(); renderUI(); initDropdowns();
        document.getElementById('loader').style.display = 'none';
    });

    function processData() {
        allItems = []; const data = dbRaw.data || {};
        Object.keys(data).forEach(y => {
            Object.keys(data[y]).forEach(s => {
                const qs = data[y][s].questions || {};
                Object.keys(qs).forEach(id => {
                    allItems.push({ id, year: y, sub: s, q: qs[id].q, a: qs[id].a, t: qs[id].ts, nQ: normalize(qs[id].q), nA: normalize(qs[id].a), path: `data/${y}/${s}/questions/${id}` });
                });
            });
        });
        allItems.sort((a,b) => new Date(b.t) - new Date(a.t));
    }

    window.renderUI = () => {
        const body = document.getElementById('tableBody');
        const head = document.getElementById('tHead');
        const moreBtn = document.getElementById('loadMoreBtn');
        let display = allItems;

        if(curYear) display = display.filter(i => i.year === curYear);
        if(curSub) display = display.filter(i => i.sub === curSub);

        head.innerHTML = `<tr><th width="40"><input type="checkbox" onclick="window.toggleAll(this)"></th><th>السؤال والمعلومات</th><th>الإجابة</th><th>المسار</th><th>الإجراء</th></tr>`;
        
        if(filterType === 'conflict' || filterType === 'dups') {
            const groups = {}; 
            display.forEach(i => {
                let key = (filterType === 'conflict') ? i.nQ : (i.nQ + i.nA);
                if(!groups[key]) groups[key] = [];
                groups[key].push(i);
            });

            let html = "";
            Object.values(groups).filter(g => g.length > 1).forEach(g => {
                html += `<tr class="group-header"><td colspan="5">📂 أسئلة مكررة: ${g[0].q}</td></tr>`;
                g.forEach(i => {
                    html += `<tr>
                        <td><input type="checkbox" class="q-cb" value="${i.path}" data-id="${i.id}" data-q="${i.q}" data-a="${i.a}" data-t="${i.t}"></td>
                        <td><span style="color:#64748b; font-size:11px">المعرف: ${i.id}</span><span class="time-label">📅 ${formatTime(i.t)}</span></td>
                        <td style="color:var(--p); font-weight:bold">${i.a}</td>
                        <td>${i.year}/${i.sub}</td>
                        <td><button class="btn btn-del" onclick="window.del('${i.path}')">حذف</button></td>
                    </tr>`;
                });
            });
            body.innerHTML = html || "<tr><td colspan='5' align='center'>لا توجد مكررات هنا ✅</td></tr>";
            moreBtn.style.display = 'none';
            return;
        }

        const chunk = display.slice(0, displayLimit);
        body.innerHTML = chunk.map(i => `<tr><td><input type="checkbox" class="q-cb" value="${i.path}" data-id="${i.id}" data-q="${i.q}" data-a="${i.a}" data-t="${i.t}"></td><td>${i.q}<span class="time-label">📅 ${formatTime(i.t)}</span></td><td style="color:var(--p); font-weight:bold">${i.a}</td><td>${i.year}/${i.sub}</td><td><button class="btn btn-del" onclick="window.del('${i.path}')">حذف</button></td></tr>`).join('');
        moreBtn.style.display = (displayLimit >= display.length) ? 'none' : 'block';
        updateStats();
    };

    window.setFilter = (type, btn) => {
        filterType = type; displayLimit = 150;
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderUI();
    };

    window.processMove = async () => {
        const selected = document.querySelectorAll('.q-cb:checked');
        const tY = document.getElementById('targetY').value; 
        const tS = document.getElementById('targetS').value;
        if(confirm(`نقل ${selected.length} عنصر إلى ${tY} > ${tS}؟`)) {
            const upds = {};
            selected.forEach(cb => {
                upds[cb.value] = null;
                upds[`data/${tY}/${tS}/questions/${cb.dataset.id}`] = { q: cb.dataset.q, a: cb.dataset.a, ts: cb.dataset.t };
            });
            await update(ref(db), upds); window.deselectAll(); alert("✅ تمت عملية النقل بنجاح!");
        }
    };

    function updateStats() {
        document.getElementById('statTotal').innerText = allItems.length;
        const qMap = {}; let dups = 0, conf = 0;
        allItems.forEach(i => { if(!qMap[i.nQ]) qMap[i.nQ] = new Set(); else dups++; qMap[i.nQ].add(i.nA); });
        Object.values(qMap).forEach(s => { if(s.size > 1) conf++; });
        document.getElementById('statConflict').innerText = conf;
        document.getElementById('statDups').innerText = dups;
    }

    window.renderTree = () => {
        const container = document.getElementById('treeContainer'); const data = dbRaw.data || {};
        container.innerHTML = Object.keys(data).map(y => `<div class="nav-item ${curYear === y && !curSub ? 'active' : ''}" onclick="window.setF('${y}')">📂 ${y}</div><div class="sub-group">${Object.keys(data[y]).map(s => `<div class="sub-item ${curSub === s ? 'active' : ''}" onclick="window.setF('${y}', '${s}')">📝 ${s}</div>`).join('')}</div>`).join('');
    };

    function initDropdowns() {
        // إضافة مجلدات إدارية جديدة
        const years = ["1AS", "2AS", "3AS", "CEM", "مجلد_المراجعة", "مجلد_المكررات"];
        const subs = ["الرياضيات", "الفيزياء", "اللغة العربية", "الفلسفة", "التاريخ", "الجغرافيا", "الإنجليزية", "الفرنسية", "العلوم", "الجيولوجيا", "الإسلامية", "الإعلام_الآلي", "تعارض_إجابات"];
        document.getElementById('targetY').innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join('');
        document.getElementById('targetS').innerHTML = subs.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    window.loadMore = () => { displayLimit += 150; renderUI(); };
    window.setF = (y, s = null) => { curYear = y; curSub = s; displayLimit = 150; curTab = 'data'; document.getElementById('btnAll').classList.remove('active'); renderUI(); };
    window.loadAll = () => { curYear = null; curSub = null; displayLimit = 150; curTab = 'data'; document.getElementById('btnAll').classList.add('active'); renderUI(); };
    window.searchTable = () => { const q = document.getElementById('qSearch').value.toLowerCase(); document.querySelectorAll('#tableBody tr').forEach(r => r.style.display = r.innerText.toLowerCase().includes(q) ? '' : 'none'); };
    window.del = (p) => { if(confirm("حذف؟")) remove(ref(db, p)); };
    window.toggleAll = (m) => { document.querySelectorAll('.q-cb').forEach(c => c.checked = m.checked); window.updSel(); };
    window.updSel = () => { const c = document.querySelectorAll('.q-cb:checked').length; document.getElementById('globalActionBar').style.display = c > 0 ? 'flex' : 'none'; document.getElementById('selCount').innerText = c; };
    window.showMove = () => { document.getElementById('moveArea').style.display = 'flex'; };
    window.bulkDelete = () => { const paths = Array.from(document.querySelectorAll('.q-cb:checked')).map(c => c.value); if(confirm(`حذف ${paths.length}؟`)) { const upds = {}; paths.forEach(p => upds[p] = null); update(ref(db), upds).then(() => window.deselectAll()); } };
    window.deselectAll = () => { document.querySelectorAll('.q-cb').forEach(c => c.checked = false); window.updSel(); document.getElementById('moveArea').style.display = 'none'; };
    window.exportBackup = () => { const blob = new Blob([JSON.stringify(dbRaw, null, 2)], {type: "application/json"}); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `Full_Backup.json`; a.click(); };
    window.addManual = () => { const y = prompt("السنة:"), s = prompt("المادة:"), q = prompt("السؤال:"), a = prompt("الإجابة:"); if(y && s && q && a) set(ref(db, `data/${y}/${s}/questions/m_${Date.now()}`), {q, a, ts: new Date().toISOString()}); };
    document.addEventListener('change', (e) => { if(e.target.classList.contains('q-cb')) window.updSel(); });
</script>
</body>
</html>
