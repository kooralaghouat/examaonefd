<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Media V9.5 | النسخة الكاملة الشاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #4361ee; --bg: #0f172a; --c: #1e293b; --d: #ef4444; --s: #10b981; --w: #f59e0b; --txt: #f8fafc; --mut: #94a3b8; }
        * { box-sizing: border-box; transition: 0.2s; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; color: var(--txt); display: flex; }
        
        /* Sidebar */
        .sidebar { width: 300px; height: 100vh; background: #020617; position: fixed; right: 0; padding: 25px; overflow-y: auto; border-left: 1px solid #1e293b; z-index: 1000; }
        .logo { font-size: 22px; font-weight: 900; color: #38bdf8; text-align: center; margin-bottom: 25px; border-bottom: 1px solid #1e293b; padding-bottom: 15px; }
        .nav-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-radius: 12px; cursor: pointer; color: var(--mut); margin-bottom: 5px; font-size: 14px; background: transparent; border: none; width: 100%; text-align: right; }
        .nav-item:hover, .nav-item.active { background: var(--p); color: white; }
        .sub-group { margin-right: 20px; border-right: 2px solid #1e293b; padding-right: 15px; margin-bottom: 15px; }
        .sub-item { padding: 8px; font-size: 13px; color: #64748b; cursor: pointer; border-radius: 8px; }
        .sub-item:hover, .sub-item.active { color: #38bdf8; background: rgba(56, 189, 248, 0.05); }

        /* Main Area */
        .main { margin-right: 300px; width: calc(100% - 300px); padding: 40px; min-height: 100vh; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--c); padding: 20px; border-radius: 20px; border-right: 4px solid var(--p); }
        .stat-card p { margin: 5px 0 0; font-size: 24px; font-weight: 900; }

        /* Tools Bar */
        .filter-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; align-items: center; }
        .f-btn { padding: 8px 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; cursor: pointer; font-size: 12px; }
        .f-btn.active { background: var(--p); border-color: var(--p); }

        /* Table Area */
        .content-card { background: var(--c); border-radius: 24px; border: 1px solid #334155; overflow: hidden; }
        .toolbar { padding: 15px; border-bottom: 1px solid #334155; display: flex; gap: 10px; align-items: center; background: #1e293b; }
        .search { flex: 1; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: white; font-family: inherit; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #1e293b; padding: 15px; text-align: right; font-size: 12px; color: var(--mut); }
        td { padding: 12px 15px; border-bottom: 1px solid #334155; font-size: 13px; color: #cbd5e1; vertical-align: middle; }
        
        .img-thumb { width: 60px; height: 40px; border-radius: 8px; object-fit: cover; border: 1px solid #334155; cursor: zoom-in; }
        .img-thumb:hover { transform: scale(4); position: absolute; z-index: 500; border: 2px solid white; box-shadow: 0 0 20px #000; }

        .btn { padding: 8px 15px; border-radius: 10px; border: none; cursor: pointer; font-family: inherit; font-weight: 700; font-size: 12px; }
        .btn-del { background: #450a0a; color: #f87171; }
        .btn-move { background: #1e1b4b; color: #818cf8; }
        .btn-more { width: 100%; padding: 15px; background: #1e293b; color: #38bdf8; border: none; cursor: pointer; font-weight: bold; border-top: 1px solid #334155; }

        /* Action bar for Move/Delete */
        .action-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #38bdf8; color: #020617; padding: 15px 40px; border-radius: 50px; display: none; align-items: center; gap: 20px; z-index: 2000; font-weight: 800; }
    </style>
</head>
<body>

    <div id="loader" style="position:fixed; inset:0; background:#020617; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <div style="width:50px; height:50px; border:5px solid #1e293b; border-top-color:#38bdf8; border-radius:50%; animation:spin 1s linear infinite;"></div>
        <p style="color:#38bdf8; margin-top:15px;">تحميل المحرك الشامل V9.5...</p>
    </div>

    <div class="sidebar">
        <div class="logo">SUPER MEDIA</div>
        <button class="nav-item active" id="btnAll" onclick="window.loadAll()">📚 كل الأسئلة</button>
        <span style="font-size:10px; color:#475569; margin:20px 0 10px; display:block;">المسارات الدراسية</span>
        <div id="treeContainer"></div>
        <span style="font-size:10px; color:#475569; margin:20px 0 10px; display:block;">الإعدادات</span>
        <button class="nav-item" onclick="window.switchTab('cfg')">🔗 الروابط والأكواد</button>
        <button class="nav-item" onclick="window.exportBackup()" style="color:var(--w)">💾 نسخة احتياطية</button>
        <button class="btn" style="background:var(--s); color:white; width:100%; margin-top:15px" onclick="window.addManual()">+ إضافة سؤال يدوي</button>
    </div>

    <div class="main">
        <div class="stat-grid">
            <div class="stat-card"><h3>الإجمالي</h3><p id="statTotal">0</p></div>
            <div class="stat-card" style="border-color:var(--d)"><h3>تعارض إجابة</h3><p id="statConflict">0</p></div>
            <div class="stat-card" style="border-color:var(--w)"><h3>مكررات</h3><p id="statDups">0</p></div>
        </div>

        <div class="filter-bar">
            <button class="f-btn active" onclick="window.setFilter('all', this)">كل الأسئلة</button>
            <button class="f-btn" onclick="window.setFilter('dups', this)" style="color:var(--w)">🔍 مكرر تماماً</button>
            <button class="f-btn" onclick="window.setFilter('conflict', this)" style="color:var(--d)">⚠️ تعارض إجابات</button>
            <button class="f-btn" onclick="window.setFilter('fuzzy', this)" style="color:#38bdf8">🎨 مكرر تشكيل</button>
            <button class="btn btn-del" id="btnAutoClean" style="display:none; margin-right:auto" onclick="window.autoClean()">🧹 تنظيف المكرر آلياً</button>
        </div>

        <div class="content-card">
            <div class="toolbar">
                <input type="text" id="qSearch" class="search" placeholder="بحث سريع في النتائج..." onkeyup="window.searchTable()">
                <!-- أداة نقل المسار المباشر -->
                <div id="moveArea" style="display:none; gap:10px; align-items:center;">
                    <span style="font-size:11px; color:var(--w)">نقل إلى:</span>
                    <select id="targetY" style="padding:8px; border-radius:8px; background:#0f172a; color:white; border:1px solid #334155;"></select>
                    <select id="targetS" style="padding:8px; border-radius:8px; background:#0f172a; color:white; border:1px solid #334155;"></select>
                    <button class="btn btn-move" onclick="window.processMove()">نقل الآن</button>
                </div>
            </div>
            <table>
                <thead id="tHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
            <button id="loadMoreBtn" class="btn-more" onclick="window.loadMore()">عرض 150 سؤال إضافي ↓</button>
        </div>
    </div>

    <div id="globalActionBar" class="action-bar">
        <span>تحديد <b id="selCount">0</b></span>
        <button class="btn btn-move" style="background:#020617; color:#38bdf8" onclick="window.showMove()">📦 تغيير المسار</button>
        <button class="btn btn-del" onclick="window.bulkDelete()">🗑️ حذف المحدد</button>
        <button class="btn" style="background:#1e293b; color:white" onclick="window.deselectAll()">إلغاء</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, onValue, remove, update, set } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const config = { databaseURL: "https://exameonefd-default-rtdb.europe-west1.firebasedatabase.app/" };
    const app = initializeApp(config);
    const db = getDatabase(app);

    let dbRaw = {}; let allItems = []; let displayLimit = 150; 
    let filterType = 'all'; let curYear = null, curSub = null; let curTab = 'data';

    const normalize = (t) => t ? t.toString().toLowerCase().replace(/[إأآ]/g, 'ا').replace(/ة/g, 'ه').replace(/ى/g, 'ي').replace(/[\u064B-\u065F]/g, "").replace(/[^\u0621-\u064A0-9a-z]/g, '').trim() : "";

    onValue(ref(db, '/'), (snap) => {
        dbRaw = snap.val() || {};
        processData(); renderTree(); renderUI(); initDropdowns();
        document.getElementById('loader').style.display = 'none';
    });

    function processData() {
        allItems = []; const data = dbRaw.data || {};
        Object.keys(data).forEach(y => {
            Object.keys(data[y]).forEach(s => {
                const qs = data[y][s].questions || {};
                Object.keys(qs).forEach(id => {
                    allItems.push({ id, year: y, sub: s, q: qs[id].q, a: qs[id].a, t: qs[id].ts, nQ: normalize(qs[id].q), nA: normalize(qs[id].a), path: `data/${y}/${s}/questions/${id}` });
                });
            });
        });
        allItems.sort((a,b) => new Date(b.t) - new Date(a.t));
    }

    window.setFilter = (type, btn) => {
        filterType = type; displayLimit = 150;
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('btnAutoClean').style.display = (type === 'dups') ? 'block' : 'none';
        renderUI();
    };

    function renderUI() {
        const body = document.getElementById('tableBody');
        const head = document.getElementById('tHead');
        const moreBtn = document.getElementById('loadMoreBtn');
        let display = allItems;

        if(curYear) display = display.filter(i => i.year === curYear);
        if(curSub) display = display.filter(i => i.sub === curSub);

        if(curTab === 'cfg') {
            renderConfig(body, head, moreBtn); return;
        }

        head.innerHTML = `<tr><th width="40"><input type="checkbox" onclick="window.toggleAll(this)"></th><th>السؤال</th><th>الإجابة</th><th>المسار</th><th>الإجراء</th></tr>`;
        
        if(filterType === 'dups') {
            const groups = {}; display.forEach(i => { let k = i.nQ + i.nA; if(!groups[k]) groups[k] = []; groups[k].push(i); });
            display = Object.values(groups).filter(g => g.length > 1).flat();
        } else if(filterType === 'conflict') {
            const groups = {}; display.forEach(i => { if(!groups[i.nQ]) groups[i.nQ] = []; groups[i.nQ].push(i); });
            display = Object.values(groups).filter(g => new Set(g.map(x => x.nA)).size > 1).flat();
        } else if(filterType === 'fuzzy') {
            const groups = {}; display.forEach(i => { let k = i.nQ + i.nA; if(!groups[k]) groups[k] = []; groups[k].push(i); });
            display = Object.values(groups).filter(g => g.length > 1 && new Set(g.map(x => x.q)).size > 1).flat();
        }

        const chunk = display.slice(0, displayLimit);
        body.innerHTML = chunk.map(i => `<tr><td><input type="checkbox" class="q-cb" value="${i.path}" data-id="${i.id}" data-q="${i.q.replace(/"/g, '&quot;')}" data-a="${i.a.replace(/"/g, '&quot;')}" data-t="${i.t}"></td><td>${format(i.q)}</td><td style="color:#38bdf8; font-weight:bold">${format(i.a)}</td><td><span style="font-size:11px">${i.year}/${i.sub}</span></td><td><button class="btn btn-del" onclick="window.del('${i.path}')">حذف</button></td></tr>`).join('');
        
        moreBtn.style.display = (displayLimit >= display.length) ? 'none' : 'block';
        updateStats();
    }

    function renderConfig(body, head, moreBtn) {
        moreBtn.style.display = 'none';
        head.innerHTML = `<tr><th>المعرف</th><th>الكود</th><th>الرابط</th><th>الإجراء</th></tr>`;
        const codes = dbRaw.codes || [];
        body.innerHTML = Object.keys(codes).map(id => `<tr><td>${id}</td><td><input type="text" id="k_${id}" value="${codes[id].k}" class="search" style="width:100px"></td><td><input type="text" id="l_${id}" value="${codes[id].l}" class="search"></td><td><button class="btn btn-move" onclick="window.saveCfg('${id}')">حفظ</button></td></tr>`).join('');
    }

    window.saveCfg = (id) => {
        const k = document.getElementById('k_'+id).value, l = document.getElementById('l_'+id).value;
        update(ref(db, `codes/${id}`), {k, l}).then(() => alert("تم الحفظ"));
    };

    window.processMove = async () => {
        const selected = document.querySelectorAll('.q-cb:checked');
        const tY = document.getElementById('targetY').value; const tS = document.getElementById('targetS').value;
        if(confirm(`نقل ${selected.length} سؤال إلى ${tY} > ${tS}؟`)) {
            const upds = {};
            selected.forEach(cb => {
                upds[cb.value] = null;
                upds[`data/${tY}/${tS}/questions/${cb.dataset.id}`] = { q: cb.dataset.q, a: cb.dataset.a, ts: cb.dataset.t };
            });
            await update(ref(db), upds); window.deselectAll(); alert("✅ تمت عملية النقل!");
        }
    };

    window.autoClean = () => {
        const groups = {}; allItems.forEach(i => { let k = i.nQ + i.nA; if(!groups[k]) groups[k] = []; groups[k].push(i); });
        const toDelete = Object.values(groups).filter(g => g.length > 1).map(g => g.slice(1)).flat();
        if(confirm(`حذف ${toDelete.length} مكرر؟`)) {
            const upds = {}; toDelete.forEach(i => upds[i.path] = null);
            update(ref(db), upds);
        }
    };

    function format(t) {
        if(!t) return "---";
        const m = t.match(/\[(Q_IMG|A_IMG|IMAGE_URL)\]:(https?:\/\/[^\s\]]+)/);
        if(m) return `<img src="${m[2]}" class="img-thumb"> <br> <small style="color:#64748b">${t.split('[')[0]}</small>`;
        return t;
    }

    function updateStats() {
        document.getElementById('statTotal').innerText = allItems.length;
        const qMap = {}; let dups = 0, conf = 0;
        allItems.forEach(i => { if(!qMap[i.nQ]) qMap[i.nQ] = new Set(); else dups++; qMap[i.nQ].add(i.nA); });
        Object.values(qMap).forEach(s => { if(s.size > 1) conf++; });
        document.getElementById('statConflict').innerText = conf;
        document.getElementById('statDups').innerText = dups;
    }

    window.renderTree = () => {
        const container = document.getElementById('treeContainer'); const data = dbRaw.data || {};
        container.innerHTML = Object.keys(data).map(y => `<div class="nav-item ${curYear === y && !curSub ? 'active' : ''}" onclick="window.setF('${y}')">📂 ${y}</div><div class="sub-group">${Object.keys(data[y]).map(s => `<div class="sub-item ${curSub === s ? 'active' : ''}" onclick="window.setF('${y}', '${s}')">📝 ${s}</div>`).join('')}</div>`).join('');
    };

    function initDropdowns() {
        const years = ["1AS", "2AS", "3AS", "CEM"];
        const subs = ["الرياضيات", "الفيزياء", "اللغة العربية", "الفلسفة", "التاريخ", "الجغرافيا", "الإنجليزية", "الفرنسية", "العلوم", "الجيولوجيا", "الإسلامية", "الإعلام_الآلي"];
        document.getElementById('targetY').innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join('');
        document.getElementById('targetS').innerHTML = subs.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    window.loadMore = () => { displayLimit += 150; renderUI(); };
    window.setF = (y, s = null) => { curYear = y; curSub = s; displayLimit = 150; curTab = 'data'; document.getElementById('btnAll').classList.remove('active'); renderUI(); };
    window.loadAll = () => { curYear = null; curSub = null; displayLimit = 150; curTab = 'data'; document.getElementById('btnAll').classList.add('active'); renderUI(); };
    window.switchTab = (t) => { curTab = t; renderUI(); };
    window.searchTable = () => { const q = document.getElementById('qSearch').value.toLowerCase(); document.querySelectorAll('#tableBody tr').forEach(r => r.style.display = r.innerText.toLowerCase().includes(q) ? '' : 'none'); };
    window.del = (p) => { if(confirm("حذف؟")) remove(ref(db, p)); };
    window.toggleAll = (m) => { document.querySelectorAll('.q-cb').forEach(c => c.checked = m.checked); window.updSel(); };
    window.updSel = () => { const c = document.querySelectorAll('.q-cb:checked').length; document.getElementById('globalActionBar').style.display = c > 0 ? 'flex' : 'none'; document.getElementById('selCount').innerText = c; };
    window.showMove = () => { document.getElementById('moveArea').style.display = 'flex'; };
    window.bulkDelete = () => { const paths = Array.from(document.querySelectorAll('.q-cb:checked')).map(c => c.value); if(confirm(`حذف ${paths.length}؟`)) { const upds = {}; paths.forEach(p => upds[p] = null); update(ref(db), upds).then(() => window.deselectAll()); } };
    window.deselectAll = () => { document.querySelectorAll('.q-cb').forEach(c => c.checked = false); window.updSel(); };
    window.exportBackup = () => { const blob = new Blob([JSON.stringify(dbRaw, null, 2)], {type: "application/json"}); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `Full_Backup.json`; a.click(); };
    window.addManual = () => { const y = prompt("السنة:"), s = prompt("المادة:"), q = prompt("السؤال:"), a = prompt("الإجابة:"); if(y && s && q && a) set(ref(db, `data/${y}/${s}/questions/m_${Date.now()}`), {q, a, ts: new Date().toISOString()}); };
    document.addEventListener('change', (e) => { if(e.target.classList.contains('q-cb')) window.updSel(); });
</script>
</body>
</html>
